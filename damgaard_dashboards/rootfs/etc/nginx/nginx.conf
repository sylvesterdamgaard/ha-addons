worker_processes 1;
error_log /var/log/nginx/error.log warn;
pid /run/nginx/nginx.pid;

events {
	worker_connections 1024;
}

http {
	include /etc/nginx/mime.types;
	default_type application/octet-stream;
	sendfile on;
	keepalive_timeout 65;
	gzip on;
	gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

	# Build the <base href> we inject into every HTML response.
	# HA Ingress sets X-Ingress-Path to e.g. "/api/hassio_ingress/<token>",
	# direct LAN access leaves it empty — we append "/" so relative asset
	# URLs resolve correctly from the SPA root.
	map $http_x_ingress_path $base_href {
		default  /;
		"~.+"    $http_x_ingress_path/;
	}

	server {
		listen 8099;
		root /app;
		index index.html;

		# Inject <base href> into the SPA shell so SvelteKit's relative asset
		# paths resolve from the SPA root regardless of current URL depth or
		# ingress prefix.
		sub_filter '<head>' '<head><base href="$base_href">';
		sub_filter_once on;
		sub_filter_types text/html;

		# SPA fallback — any unknown path returns the SPA shell.
		# no-store on the shell so a new index.html reaches tablets within
		# their version-poll cycle; SvelteKit's version.json fetch + our
		# layout-level `updated` watcher forces a reload from there.
		location / {
			add_header Cache-Control "no-store, must-revalidate";
			try_files $uri $uri/ /index.html;
		}

		# Runtime config is rewritten on every container start.
		location = /config.json {
			add_header Cache-Control "no-store, must-revalidate";
			try_files $uri =404;
		}

		# Static assets are fingerprinted by SvelteKit — safe to cache hard.
		# Includes _app/version.json, which SvelteKit polls to detect releases.
		location /_app/ {
			expires 1y;
			add_header Cache-Control "public, immutable";
			try_files $uri =404;
		}

		# …except version.json itself must NOT be cached, else the version
		# poller keeps seeing the old hash and never triggers the reload.
		location = /_app/version.json {
			add_header Cache-Control "no-store, must-revalidate";
			try_files $uri =404;
		}
	}
}
