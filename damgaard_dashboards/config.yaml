---
name: Damgaard Dashboards
version: "0.3.4"
slug: damgaard_dashboards
description: Custom dashboards for Acer Android tablets (Family Hub + room views)
url: https://github.com/sylvesterdamgaard/homeassistant
arch:
  - aarch64
  - amd64
  - armv7
  - i386
  - armhf
init: false
# Ingress: serve the dashboard under HA's own Nabu Casa / LAN URL so it's
# reachable remotely through the cloud tunnel (no custom port forwarding).
ingress: true
ingress_port: 8099
panel_icon: mdi:view-dashboard-variant
panel_title: Damgaard
# LAN port kept for Fully Kiosk tablets that stay local.
ports:
  8099/tcp: 8099
ports_description:
  8099/tcp: LAN access for tablets (http://<ha-host>:8099/)
map:
  - share:rw
options:
  ha_url: ""
  ha_token: ""
schema:
  ha_url: str
  ha_token: password
